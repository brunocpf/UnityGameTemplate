name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  format-check:
    name: dotnet format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Verify formatting
        run: dotnet format __GAME_NAMESPACE__.slnx --verify-no-changes --verbosity minimal

  asmdef-check:
    name: Assembly dependency rules
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Run asmdef dependency checker
        env:
          GAME_NAMESPACE: __GAME_NAMESPACE__
        run: python3 scripts/check_asmdef_deps.py

  test:
    name: Unity tests (${{ matrix.testMode }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        testMode: [editmode, playmode]
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Cache Library
        uses: actions/cache@v5
        with:
          path: Library
          key: Library-${{ matrix.testMode }}-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-${{ matrix.testMode }}-
            Library-

      - name: Run tests
        uses: game-ci/unity-test-runner@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          unityVersion: __UNITY_VERSION__
          testMode: ${{ matrix.testMode }}
          artifactsPath: TestResults-${{ matrix.testMode }}
          githubToken: ${{ secrets.GITHUB_TOKEN }}
          checkName: ${{ matrix.testMode }} test results

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: Test results (${{ matrix.testMode }})
          path: TestResults-${{ matrix.testMode }}
