name: Bug report
description: Something is broken or behaving unexpectedly.
title: "[Bug] "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: One-sentence description of the bug.
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Reproduction steps
      description: Numbered steps that reliably reproduce the issue.
      placeholder: |
        1. Open the SampleScene
        2. ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: input
    id: unity-version
    attributes:
      label: Unity version
      placeholder: __UNITY_VERSION__
    validations:
      required: true

  - type: input
    id: platform
    attributes:
      label: Platform
      placeholder: macOS 14, Windows 11, Editor / Standalone player ...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
      description: Paste relevant Unity console output or attach screenshots.
